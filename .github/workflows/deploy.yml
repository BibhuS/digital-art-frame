name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Prepare Pages output
        run: |
          # TanStack Start's production build writes browser assets here.
          PUBLIC_DIR=".output/public"

          if [ ! -d "$PUBLIC_DIR" ]; then
            echo "Expected $PUBLIC_DIR to exist after build. Listing .output:"
            find .output -maxdepth 2 -type d || true
            exit 1
          fi

          INDEX_JS="$(basename "$(ls "$PUBLIC_DIR"/assets/index-*.js | head -n 1)")"
          STYLES_CSS="$(basename "$(ls "$PUBLIC_DIR"/assets/styles-*.css | head -n 1)")"

          if [ -z "$INDEX_JS" ] || [ -z "$STYLES_CSS" ]; then
            echo "Could not find expected client assets in $PUBLIC_DIR/assets"
            ls -la "$PUBLIC_DIR/assets" || true
            exit 1
          fi

          # GitHub Pages is static-only. This app has no server functions, so we
          # serve a small SPA shell that loads the compiled TanStack client app.
          cat > "$PUBLIC_DIR/index.html" <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Bibhu Bhushan Sinha — Senior Data Engineer</title>
              <meta name="description" content="Portfolio of Bibhu Bhushan Sinha, Senior Data Engineer with 13+ years building Spark, Databricks, and cloud data platforms." />
              <meta property="og:title" content="Bibhu Bhushan Sinha — Senior Data Engineer" />
              <meta property="og:description" content="13+ years engineering Spark, Databricks and cloud data pipelines across banking, insurance and IoT." />
              <meta property="og:type" content="website" />
              <meta name="twitter:card" content="summary_large_image" />
              <link rel="icon" href="/favicon.ico" type="image/x-icon" />
              <link rel="stylesheet" href="/assets/$STYLES_CSS" />
              <script>
                (function() {
                  try {
                    const saved = localStorage.getItem('theme');
                    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    document.documentElement.classList.toggle('dark', saved ? saved === 'dark' : prefersDark);
                  } catch (e) {}
                })();
              </script>
            </head>
            <body>
              <script type="module" src="/assets/$INDEX_JS"></script>
            </body>
          </html>
          EOF

          # SPA fallback: GitHub Pages serves 404.html when a route has no file.
          cp "$PUBLIC_DIR/index.html" "$PUBLIC_DIR/404.html"

          # Also copy index.html into each route directory so direct links
          # (e.g. /blog/slug) work without hitting the 404 fallback.
          for route in /blog /projects; do
            mkdir -p "$PUBLIC_DIR$route"
            cp "$PUBLIC_DIR/index.html" "$PUBLIC_DIR$route/index.html"
          done

          # Disable Jekyll so files/folders starting with _ are served as-is.
          echo "" > "$PUBLIC_DIR/.nojekyll"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4