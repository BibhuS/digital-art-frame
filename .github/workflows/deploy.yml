name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            export GITHUB_PAGES_BASE="/"
          else
            export GITHUB_PAGES_BASE="/${REPO_NAME}/"
          fi
          echo "Using base: $GITHUB_PAGES_BASE"
          echo "GITHUB_PAGES_BASE=$GITHUB_PAGES_BASE" >> "$GITHUB_ENV"
          bun run build

      - name: Prepare Pages output
        run: |
          BASE_PATH="${GITHUB_PAGES_BASE:-/}"
          echo "Base path: $BASE_PATH"
          # TanStack Start's production build writes browser assets here.
          PUBLIC_DIR=".output/public"

          if [ ! -d "$PUBLIC_DIR" ]; then
            echo "Expected $PUBLIC_DIR to exist after build. Listing .output:"
            find .output -maxdepth 2 -type d || true
            exit 1
          fi

          # GitHub Pages is static-only, but TanStack Router's client needs the
          # SSR hydration data that the server build injects. Render static HTML
          # from the built server instead of hand-writing a blank SPA shell.
          cat > /tmp/render-pages.mjs <<'EOF'
          import { mkdir, writeFile } from "node:fs/promises";
          import path from "node:path";

          const publicDir = process.env.PUBLIC_DIR;
          const basePath = process.env.BASE_PATH || "/";
          const origin = "https://bibhus.github.io";
          const routes = ["/", "/blog"];
          const serverEntry = await import(path.resolve(".output/server/index.mjs"));
          const handler = serverEntry.default ?? serverEntry;
          const ctx = { waitUntil() {}, passThroughOnException() {} };

          function fixRootAssetUrls(html) {
            return html
              .replaceAll('"/assets/', `"${basePath}assets/`)
              .replace(/href="\/favicon\.ico"/g, `href="${basePath}favicon.ico"`);
          }

          async function render(route) {
            const response = await handler.fetch(
              new Request(`${origin}${route}`),
              {},
              ctx,
            );
            if (!response.ok) {
              throw new Error(`Failed to render ${route}: ${response.status}`);
            }

            const html = fixRootAssetUrls(await response.text());
            const outputDir = route === "/" ? publicDir : path.join(publicDir, route.slice(1));
            await mkdir(outputDir, { recursive: true });
            await writeFile(path.join(outputDir, "index.html"), html);

            if (route === "/") {
              await writeFile(path.join(publicDir, "404.html"), html);
            }
          }

          for (const route of routes) {
            await render(route);
          }
          EOF

          PUBLIC_DIR="$PUBLIC_DIR" BASE_PATH="$BASE_PATH" node /tmp/render-pages.mjs

          # Disable Jekyll so files/folders starting with _ are served as-is.
          echo "" > "$PUBLIC_DIR/.nojekyll"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4