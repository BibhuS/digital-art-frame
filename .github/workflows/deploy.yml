name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (static / SPA)
        env:
          NITRO_PRESET: static
        run: bun run build

      - name: Prepare Pages output
        run: |
          # Nitro static preset outputs to .output/public
          PUBLIC_DIR=".output/public"

          if [ ! -d "$PUBLIC_DIR" ]; then
            echo "Expected $PUBLIC_DIR to exist after static build. Listing .output:"
            find .output -maxdepth 2 -type d || true
            exit 1
          fi

          # SPA fallback: GitHub Pages serves 404.html when a route has no file.
          cp "$PUBLIC_DIR/index.html" "$PUBLIC_DIR/404.html"

          # Also copy index.html into each route directory so direct links
          # (e.g. /blog/slug) work without hitting the 404 fallback.
          for route in /blog /projects; do
            mkdir -p "$PUBLIC_DIR$route"
            cp "$PUBLIC_DIR/index.html" "$PUBLIC_DIR$route/index.html"
          done

          # Disable Jekyll so files/folders starting with _ are served as-is.
          echo "" > "$PUBLIC_DIR/.nojekyll"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4